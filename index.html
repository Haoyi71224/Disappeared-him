<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Hello World 进阶版</title>
    <style>
        body {
            text-align: center;
            margin-top: 100px;
            font-family: Arial, sans-serif;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #008CBA;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        /* 专门给显示文字的区域加样式 */
        #messageArea {
            margin-top: 30px;
            font-size: 24px;
            color: #333;
            min-height: 30px; /* 防止页面抖动 */
        }
    </style>
</head>
<body>
    <!-- HTML：多了一个用来装文字的 div -->
    <button id="myButton">点击显示 Hello World</button>
    <div id="messageArea"></div>

    <script>
        // 1. 找到按钮和显示区域
        const button = document.getElementById('myButton');
        const messageArea = document.getElementById('messageArea');

        // 2. 监听按钮的点击动作
        button.addEventListener('click', function() {
            // 3. 改变显示区域的文本内容
            messageArea.textContent = 'Hello World!';
        });
    </script>
</body>
</html>
